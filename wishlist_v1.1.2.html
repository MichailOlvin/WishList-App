<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Wishlist</title>
  <script src="https://telegram.org/js/telegram-web-app.js" onerror="console.warn('Telegram SDK not available')"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0d0d0f;--bg2:#111115;--bg3:#13131a;--border:#1e1e24;--border2:#2a2a32;--text:#e8e4dc;--text2:#aaa;--text3:#555;--text4:#333;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
    .header{padding:20px 20px 12px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;}
    .title-label{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
    .title-main{font-size:28px;font-weight:800;letter-spacing:-0.02em;line-height:1;}
    .version-tag{font-size:9px;font-family:'DM Mono',monospace;color:var(--text4);margin-top:2px;}
    .header-right{display:flex;gap:6px;align-items:center;padding-top:4px;}
    .sync-badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3);white-space:nowrap;}
    .sync-badge.ok{border-color:#1a3a1a;color:#4aff9e;background:#0d1a0d;cursor:pointer;}
    .sync-badge.err{border-color:#3a1a1a;color:#ff7a4a;background:#1a0d0d;cursor:pointer;}
    .sync-badge.syncing{border-color:#2a2a1a;color:#ffd44a;background:#1a1a0d;}
    .icon-btn-hdr{background:none;border:1px solid var(--border);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);flex-shrink:0;transition:all 0.15s;}
    .icon-btn-hdr:active{background:var(--border);}
    .stats{display:flex;gap:16px;margin-top:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
    .stats b{color:var(--text2);font-weight:400;}
    .controls{padding:10px 20px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
    .controls::-webkit-scrollbar{display:none;}
    .cat-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
    .cat-btn.active{border-color:var(--text);color:var(--text);background:#1a1a1e;}
    .sort-wrap{margin-left:auto;flex-shrink:0;position:relative;}
    .sort-select{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 26px 5px 13px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;color:var(--text3);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
    .sort-wrap::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);border:4px solid transparent;border-top-color:var(--text3);margin-top:2px;pointer-events:none;}
    .sort-select option{background:#1a1a1e;color:var(--text);}
    .list{padding:12px 20px 100px;display:flex;flex-direction:column;gap:8px;}
    .empty{text-align:center;padding:60px 20px;color:var(--text4);font-size:13px;font-weight:600;}
    .empty-icon{font-size:36px;display:block;margin-bottom:12px;}
    .item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden;animation:fadeIn 0.2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
    .item.bought{opacity:0.35;}
    .check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px;}
    .check.checked{border-color:transparent;}
    .check svg{display:none;}
    .check.checked svg{display:block;}
    .info{flex:1;min-width:0;}
    .item-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.3;}
    .item.bought .item-name{text-decoration:line-through;color:var(--text3);}
    .item-note{font-size:11px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;font-weight:300;}
    .item-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
    .cat-tag{font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 8px;border-radius:10px;text-transform:uppercase;}
    .item-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);margin-left:auto;}
    .actions{display:flex;gap:2px;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--text4);border-radius:6px;display:flex;align-items:center;}
    .icon-btn:active{color:var(--text2);background:var(--border);}
    .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:16px;background:var(--text);color:var(--bg);border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.6);transition:transform 0.2s;font-family:'Syne',sans-serif;font-weight:700;z-index:50;}
    .fab:active{transform:scale(0.93);}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeO 0.2s ease;}
    @keyframes fadeO{from{opacity:0}to{opacity:1}}
    .modal{background:var(--bg3);border:1px solid #222;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;animation:slideUp 0.25s cubic-bezier(0.34,1.15,0.64,1);max-height:90vh;overflow-y:auto;}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
    .modal-title{font-size:17px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px;}
    .modal-sub{font-size:11px;color:var(--text3);margin-bottom:18px;line-height:1.5;font-family:'DM Mono',monospace;}
    .field{margin-bottom:13px;}
    .field label{display:block;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
    .field input,.field textarea{width:100%;background:var(--bg);border:1px solid #222;border-radius:10px;padding:10px 13px;font-size:14px;font-family:'Syne',sans-serif;font-weight:600;color:var(--text);outline:none;transition:border-color 0.15s;}
    .field input:focus,.field textarea:focus{border-color:#444;}
    .field textarea{resize:none;height:60px;font-weight:400;font-family:'DM Mono',monospace;font-size:12px;}
    .field-hint{font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace;line-height:1.5;}
    .field-hint a{color:#4a9eff;}
    .error-box{background:#1a0d0d;border:1px solid #3a1a1a;border-radius:10px;padding:10px 13px;font-family:'DM Mono',monospace;font-size:11px;color:#ff7a4a;line-height:1.5;word-break:break-all;margin-bottom:13px;}
    .info-box{background:#0d1a0d;border:1px solid #1a3a1a;border-radius:10px;padding:10px 13px;font-family:'DM Mono',monospace;font-size:11px;color:#4aff9e;line-height:1.5;margin-bottom:13px;}
    .gist-id-box{background:var(--bg);border:1px solid #1a3a1a;border-radius:10px;padding:10px 44px 10px 13px;font-family:'DM Mono',monospace;font-size:12px;color:#4aff9e;word-break:break-all;cursor:pointer;position:relative;}
    .gist-id-box::after{content:'скопировать';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text3);white-space:nowrap;}
    .gist-id-box.copied{border-color:#4aff9e;}
    .gist-id-box.copied::after{content:'скопировано ✓';color:#4aff9e;}
    .cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
    .cat-opt{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 3px;text-align:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;color:var(--text3);transition:all 0.15s;}
    .pri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
    .pri-opt{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 3px;text-align:center;font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;color:var(--text3);transition:all 0.15s;}
    .pri-opt.selected{border-color:#888;color:var(--text);background:#1a1a1e;}
    .divider{height:1px;background:var(--border);margin:16px 0;}
    .modal-actions{display:flex;gap:8px;margin-top:10px;}
    .btn-cancel{flex:1;background:none;border:1px solid #222;border-radius:12px;padding:12px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text3);cursor:pointer;}
    .btn-save{flex:2;background:var(--text);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;font-family:'Syne',sans-serif;color:var(--bg);cursor:pointer;}
    .btn-save:disabled{opacity:0.3;cursor:default;}
    .btn-danger{width:100%;background:none;border:1px solid #3a1a1a;border-radius:12px;padding:12px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;color:#ff7a4a;cursor:pointer;}
    .btn-secondary{flex:1;background:none;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text3);cursor:pointer;}
    .loading{display:flex;align-items:center;justify-content:center;height:60vh;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text3);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const VERSION = 'v1.1.2';

// ── Telegram init (safe) ──
const tg = (function(){
  try { return (typeof Telegram !== 'undefined' && Telegram.WebApp) ? Telegram.WebApp : null; }
  catch(e) { return null; }
})();
try { if (tg) { tg.ready(); tg.expand(); } } catch(e) {}

// ── Constants ──
const SK = 'wl_items_v2';
const TK = 'wl_gh_token';
const GK = 'wl_gist_id';
const GF = 'wishlist.json';

const CATS = ['Техника','Одежда','Игры','Барное','Разное'];
const CC = {
  'Техника': {bg:'#1a2a3a', a:'#4a9eff'},
  'Одежда':  {bg:'#2a1a2a', a:'#c47aff'},
  'Игры':    {bg:'#1a2a1a', a:'#4aff9e'},
  'Барное':  {bg:'#2a1a1a', a:'#ff7a4a'},
  'Разное':  {bg:'#2a2a1a', a:'#ffd44a'},
};
const PRI = [
  {k:'hot', l:'🔥 Хочу'},
  {k:'mid', l:'👍 Надо'},
  {k:'low', l:'💤 Когда-нибудь'},
];

// ── State ──
let items = [];
let filter = 'Все';
let sort = 'added';
let showForm = false;
let showSet = false;
let editId = null;
let form = {name:'', price:'', category:'Техника', note:'', priority:'mid'};
let loading = true;
let syncSt = 'idle'; // idle | syncing | ok | err
let lastError = '';
let settingsSaving = false;
// FIX: sf initialized cleanly without self-reference
let sf = {token: '', gistId: ''};

// ── LocalStorage helpers ──
function ls(k) {
  try { return localStorage.getItem(k) || null; }
  catch(e) { return null; }
}
function lsS(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
function lsD(k) { try { localStorage.removeItem(k); } catch(e) {} }

// ── Init sf from storage ──
function initSf() {
  sf.token = ls(TK) || '';
  sf.gistId = ls(GK) || '';
}
initSf();

// ── Helpers ──
function fmt(v) {
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '';
  return '€' + n.toLocaleString('lt-LT', {minimumFractionDigits:0, maximumFractionDigits:2});
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function parseJSON(str) {
  try { return str ? JSON.parse(str) : null; }
  catch(e) { return null; }
}

// ── GitHub Gist API ──
function ghHeaders(token) {
  return {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json',
  };
}

async function gistCreate(token, data) {
  const r = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: ghHeaders(token),
    body: JSON.stringify({description:'Wishlist App', public:false, files:{[GF]:{content:JSON.stringify(data)}}}),
  });
  const d = await r.json();
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + (d.message || 'unknown error'));
  return d.id;
}

async function gistUpdate(token, id, data) {
  const r = await fetch('https://api.github.com/gists/' + id, {
    method: 'PATCH',
    headers: ghHeaders(token),
    body: JSON.stringify({files:{[GF]:{content:JSON.stringify(data)}}}),
  });
  if (!r.ok) { const d = await r.json(); throw new Error('HTTP ' + r.status + ': ' + (d.message || 'unknown error')); }
}

async function gistRead(token, id) {
  const r = await fetch('https://api.github.com/gists/' + id, { headers: ghHeaders(token) });
  if (!r.ok) { const d = await r.json(); throw new Error('HTTP ' + r.status + ': ' + (d.message || 'unknown error')); }
  const d = await r.json();
  return parseJSON(d.files?.[GF]?.content);
}

// ── Storage ──
function locSave(data) {
  const s = JSON.stringify(data);
  try { if (tg && tg.CloudStorage) tg.CloudStorage.setItem(SK, s); } catch(e) {}
  lsS(SK, s);
}

function locLoad() {
  return new Promise(resolve => {
    try {
      if (tg && tg.CloudStorage) {
        tg.CloudStorage.getItem(SK, function(err, val) {
          resolve(!err && val ? (parseJSON(val) || []) : []);
        });
        return;
      }
    } catch(e) {}
    resolve(parseJSON(ls(SK)) || []);
  });
}

async function loadAll() {
  const t = ls(TK), g = ls(GK);
  if (t && g) {
    try { const data = await gistRead(t, g); if (data !== null) return data; }
    catch(e) { lastError = e.message; }
  }
  return locLoad();
}

async function saveAll(data) {
  locSave(data);
  const t = ls(TK);
  if (!t) return;
  syncSt = 'syncing'; render();
  try {
    const g = ls(GK);
    if (g) { await gistUpdate(t, g, data); }
    else { const id = await gistCreate(t, data); lsS(GK, id); sf.gistId = id; }
    syncSt = 'ok'; lastError = ''; render();
    setTimeout(() => { syncSt = 'idle'; render(); }, 2500);
  } catch(e) {
    syncSt = 'err'; lastError = e.message; render();
  }
}

async function pullGist() {
  const t = ls(TK), g = ls(GK);
  if (!t || !g) return;
  syncSt = 'syncing'; render();
  try {
    const data = await gistRead(t, g);
    if (data !== null) { items = data; locSave(data); }
    syncSt = 'ok'; lastError = ''; render();
    setTimeout(() => { syncSt = 'idle'; render(); }, 2000);
  } catch(e) {
    syncSt = 'err'; lastError = e.message; render();
  }
}

// ── Render ──
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  if (loading) {
    app.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    return;
  }

  const allC = ['Все', ...CATS];
  const vis = items
    .filter(i => filter === 'Все' || i.category === filter)
    .sort((a, b) => {
      if (sort === 'price_asc')  return (parseFloat(a.price)||0) - (parseFloat(b.price)||0);
      if (sort === 'price_desc') return (parseFloat(b.price)||0) - (parseFloat(a.price)||0);
      if (sort === 'priority') {
        const o = {hot:0, mid:1, low:2};
        return (o[a.priority] ?? 1) - (o[b.priority] ?? 1);
      }
      return b.id - a.id;
    });

  const total = vis.reduce((s, i) => s + (parseFloat(i.price) || 0), 0);
  const bn = vis.filter(i => i.bought).length;
  const gistId = ls(GK) || sf.gistId || '';
  const token = ls(TK) || sf.token || '';

  const badge =
    syncSt === 'syncing' ? '<span class="sync-badge syncing">синхр...</span>' :
    syncSt === 'ok'      ? '<span class="sync-badge ok" id="btn-pull">✓ сохранено</span>' :
    syncSt === 'err'     ? '<span class="sync-badge err" id="badge-err">! ошибка</span>' :
    gistId               ? '<span class="sync-badge ok" id="btn-pull">● gist</span>' : '';

  const iHTML = vis.length === 0
    ? '<div class="empty"><span class="empty-icon">🛒</span>' + (items.length === 0 ? 'Список пуст — добавь первое желание' : 'Нет позиций в этой категории') + '</div>'
    : vis.map(item => {
        const c = CC[item.category] || CC['Разное'];
        const p = PRI.find(x => x.k === item.priority);
        return (
          '<div class="item' + (item.bought ? ' bought' : '') + '" data-id="' + item.id + '">' +
          '<style>.item[data-id="' + item.id + '"]::before{background:' + c.a + '}</style>' +
          '<div class="check' + (item.bought ? ' checked' : '') + '" data-action="toggle" data-id="' + item.id + '" style="' + (item.bought ? 'background:' + c.a + ';' : '') + '">' +
            '<svg width="11" height="9" fill="none"><path d="M1 4.5l3 3 6-6" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</div>' +
          '<div class="info">' +
            '<div class="item-name">' + esc(item.name) + '</div>' +
            (item.note ? '<div class="item-note">' + esc(item.note) + '</div>' : '') +
            '<div class="item-bottom">' +
              '<span class="cat-tag" style="background:' + c.bg + ';color:' + c.a + '">' + item.category + '</span>' +
              (p ? '<span style="font-size:12px">' + p.l.split(' ')[0] + '</span>' : '') +
              (item.price ? '<span class="item-price">' + fmt(item.price) + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="actions">' +
            '<button class="icon-btn" data-action="edit" data-id="' + item.id + '"><svg width="14" height="14" fill="none"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
            '<button class="icon-btn" data-action="delete" data-id="' + item.id + '"><svg width="14" height="14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>' +
          '</div></div>'
        );
      }).join('');

  // Settings modal
  const setHTML = showSet ? (
    '<div class="overlay" id="overlay"><div class="modal">' +
    '<div class="modal-title">Синхронизация</div>' +
    '<div class="modal-sub">Данные хранятся в приватном GitHub Gist. Каждое изменение автоматически сохраняется. При открытии на другом устройстве — подтягивается актуальная версия.<br><br>⚠️ Синхронизация настраивается отдельно на каждом устройстве.</div>' +
    (lastError ? '<div class="error-box">' + esc(lastError) + '</div>' : '') +
    (settingsSaving ? '<div class="info-box">Создаём Gist, подождите...</div>' : '') +
    '<div class="field"><label>GitHub Token (classic)</label>' +
    '<input id="s-t" type="text" value="' + esc(sf.token) + '" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" spellcheck="false"/>' +
    '<div class="field-hint">Создай: <a href="https://github.com/settings/tokens/new?scopes=gist&description=WishlistApp" target="_blank">github.com/settings/tokens</a><br>→ Generate new token → <b>classic</b> → поставь галку <b>gist</b></div></div>' +
    (gistId ?
      '<div class="field"><label>Gist ID <span style="color:#4aff9e">✓ подключён</span></label>' +
      '<div class="gist-id-box" id="copy-gist">' + esc(gistId) + '</div>' +
      '<div class="field-hint">Тапни чтобы скопировать → вставь на другом устройстве</div></div>'
      :
      '<div class="field"><label>Gist ID <span style="opacity:0.5;font-weight:400">(создастся само)</span></label>' +
      '<input id="s-g" type="text" value="' + esc(sf.gistId) + '" placeholder="или вставь существующий ID"/>' +
      '<div class="field-hint">Если уже настраивал на другом устройстве — вставь ID оттуда</div></div>'
    ) +
    '<div class="modal-actions">' +
      '<button class="btn-cancel" id="btn-sc">Закрыть</button>' +
      '<button class="btn-save" id="btn-ss"' + (settingsSaving ? ' disabled' : '') + '>' + (gistId ? 'Обновить токен' : 'Сохранить и создать Gist') + '</button>' +
    '</div>' +
    (gistId ? '<div class="modal-actions"><button class="btn-secondary" id="btn-pull-s">↓ Загрузить данные из Gist</button></div>' : '') +
    (token ? '<div class="divider"></div><button class="btn-danger" id="btn-sd">Отключить синхронизацию</button>' : '') +
    '<div class="divider"></div><div style="text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Wishlist ' + VERSION + '</div>' +
    '</div></div>'
  ) : '';

  const fHTML = showForm ? (
    '<div class="overlay" id="overlay"><div class="modal">' +
    '<div class="modal-title">' + (editId !== null ? 'Редактировать' : 'Добавить желание') + '</div>' +
    '<div class="field"><label>Название</label><input id="f-n" type="text" value="' + esc(form.name) + '" placeholder="Что хочешь купить?" autocomplete="off"/></div>' +
    '<div class="field"><label>Примерная цена (€)</label><input id="f-p" type="number" value="' + esc(form.price) + '" placeholder="0" min="0"/></div>' +
    '<div class="field"><label>Категория</label><div class="cat-grid">' +
      CATS.map(c => '<div class="cat-opt' + (form.category === c ? ' selected' : '') + '" data-cat="' + c + '" style="' + (form.category === c ? 'border-color:' + CC[c].a + ';color:' + CC[c].a + ';background:' + CC[c].bg : '') + '">' + c + '</div>').join('') +
    '</div></div>' +
    '<div class="field"><label>Приоритет</label><div class="pri-grid">' +
      PRI.map(p => '<div class="pri-opt' + (form.priority === p.k ? ' selected' : '') + '" data-pri="' + p.k + '">' + p.l + '</div>').join('') +
    '</div></div>' +
    '<div class="field"><label>Заметка (необязательно)</label><textarea id="f-no" placeholder="Ссылка, модель, размер...">' + esc(form.note) + '</textarea></div>' +
    '<div class="modal-actions"><button class="btn-cancel" id="btn-cancel">Отмена</button><button class="btn-save" id="btn-save"' + (form.name.trim() ? '' : ' disabled') + '>' + (editId !== null ? 'Сохранить' : 'Добавить') + '</button></div>' +
    '</div></div>'
  ) : '';

  app.innerHTML =
    '<div class="header"><div class="header-top">' +
    '<div><div class="title-label">Wishlist</div><div class="title-main">Хочу купить</div><div class="version-tag">' + VERSION + '</div></div>' +
    '<div class="header-right">' + badge +
    '<button class="icon-btn-hdr" id="btn-settings-open"><svg width="16" height="16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M3.5 12.5l.7-.7M11.8 4.2l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>' +
    '</div></div>' +
    '<div class="stats"><div><b>' + items.length + '</b> позиций</div>' +
    (total > 0 ? '<div><b>' + fmt(total) + '</b> примерно</div>' : '') +
    (bn > 0 ? '<div><b>' + bn + '</b> куплено</div>' : '') +
    '</div></div>' +
    '<div class="controls">' +
    allC.map(c => '<button class="cat-btn' + (filter === c ? ' active' : '') + '" data-f="' + c + '">' + c + '</button>').join('') +
    '<div class="sort-wrap"><select class="sort-select" id="ss">' +
    '<option value="added"'   + (sort === 'added'      ? ' selected' : '') + '>По дате</option>' +
    '<option value="priority"'+ (sort === 'priority'   ? ' selected' : '') + '>По приоритету</option>' +
    '<option value="price_asc"'+(sort === 'price_asc'  ? ' selected' : '') + '>Дешевле</option>' +
    '<option value="price_desc"'+(sort==='price_desc'  ? ' selected' : '') + '>Дороже</option>' +
    '</select></div></div>' +
    '<div class="list">' + iHTML + '</div>' +
    '<button class="fab" id="fab">+</button>' +
    setHTML + fHTML;

  bind();
}

// ── Event binding ──
function bind() {
  const on = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };

  on('fab', 'click', () => {
    editId = null;
    form = {name:'', price:'', category:'Техника', note:'', priority:'mid'};
    showForm = true; render();
    setTimeout(() => document.getElementById('f-n')?.focus(), 80);
  });
  on('btn-settings-open', 'click', () => { showSet = true; render(); });
  on('btn-pull', 'click', () => pullGist());
  on('badge-err', 'click', () => { showSet = true; render(); });
  on('ss', 'change', e => { sort = e.target.value; render(); });

  document.querySelectorAll('[data-f]').forEach(el =>
    el.addEventListener('click', () => { filter = el.dataset.f; render(); }));

  document.querySelectorAll('[data-action]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(el.dataset.id);
      if (el.dataset.action === 'toggle') togItem(id);
      if (el.dataset.action === 'delete') delItem(id);
      if (el.dataset.action === 'edit')   editItem(id);
    }));

  document.querySelectorAll('[data-cat]').forEach(el =>
    el.addEventListener('click', () => { form.category = el.dataset.cat; render(); }));
  document.querySelectorAll('[data-pri]').forEach(el =>
    el.addEventListener('click', () => { form.priority = el.dataset.pri; render(); }));

  on('f-n',  'input', e => { form.name = e.target.value; const s = document.getElementById('btn-save'); if(s) s.disabled = !form.name.trim(); });
  on('f-p',  'input', e => form.price = e.target.value);
  on('f-no', 'input', e => form.note = e.target.value);
  on('btn-cancel', 'click', () => { showForm = false; render(); });
  on('btn-save',   'click', saveItem);
  on('f-n', 'keydown', e => { if (e.key === 'Enter') saveItem(); });

  on('s-t', 'input', e => sf.token = e.target.value.trim());
  on('s-g', 'input', e => sf.gistId = e.target.value.trim());
  on('btn-sc',     'click', () => { showSet = false; render(); });
  on('btn-ss',     'click', saveSettings);
  on('btn-sd',     'click', clearSync);
  on('btn-pull-s', 'click', () => { showSet = false; pullGist(); });

  on('copy-gist', 'click', e => {
    const id = ls(GK) || sf.gistId;
    navigator.clipboard?.writeText(id)
      .then(() => { e.currentTarget.classList.add('copied'); setTimeout(() => e.currentTarget?.classList.remove('copied'), 2000); })
      .catch(() => {});
  });

  on('overlay', 'click', e => {
    if (e.target.id === 'overlay') { showForm = false; showSet = false; render(); }
  });
}

// ── Actions ──
async function saveSettings() {
  const token = sf.token.trim();
  if (!token) return;
  lsS(TK, token);
  const manualGistId = sf.gistId.trim();
  if (manualGistId) lsS(GK, manualGistId);

  settingsSaving = true; lastError = ''; render();
  try {
    const existingId = ls(GK);
    if (existingId) {
      await gistUpdate(token, existingId, items);
    } else {
      const newId = await gistCreate(token, items);
      lsS(GK, newId);
      sf.gistId = newId;
    }
    settingsSaving = false; syncSt = 'ok'; lastError = ''; render();
    setTimeout(() => { syncSt = 'idle'; render(); }, 3000);
  } catch(e) {
    settingsSaving = false; syncSt = 'err'; lastError = e.message; render();
  }
}

function clearSync() {
  lsD(TK); lsD(GK);
  sf = {token:'', gistId:''};
  showSet = false; syncSt = 'idle'; lastError = '';
  render();
}

function saveItem() {
  if (!form.name.trim()) return;
  if (editId !== null) {
    items = items.map(i => i.id === editId ? {...i, ...form} : i);
    editId = null;
  } else {
    items = [...items, {...form, id: Date.now(), bought: false}];
  }
  saveAll(items); showForm = false; render();
}

function delItem(id)  { items = items.filter(i => i.id !== id); saveAll(items); render(); }
function togItem(id)  { items = items.map(i => i.id === id ? {...i, bought: !i.bought} : i); saveAll(items); render(); }
function editItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  form = {name: item.name, price: item.price, category: item.category, note: item.note || '', priority: item.priority || 'mid'};
  editId = id; showForm = true; render();
  setTimeout(() => document.getElementById('f-n')?.focus(), 80);
}

// ── Init ──
loadAll().then(data => {
  items = Array.isArray(data) ? data : [];
  loading = false;
  render();
}).catch(() => {
  items = [];
  loading = false;
  render();
});
</script>
</body>
